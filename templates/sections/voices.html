<!-- ⑥ 推薦（自動無限輪播） -->
{% set vn = col.testimonials | length %}
{% set vdur = vn * (s.voices.seconds_per_quote or 10) %}
<section id="voices" style="background: #EDEBF4; padding: clamp(46px, 6vw, 82px) 0;">
  <div style="max-width: 1240px; margin: 0 auto; padding: 0 clamp(24px, 6vw, 80px);">
    <p style="margin: 0 0 16px; font-size: 14px; letter-spacing: 0.2em; font-weight: 700; color: #625E92; text-align: center;">{{ s.voices.eyebrow }}</p>
    <h2 style="margin: 0 auto; max-width: 760px; font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: clamp(26px, 3.4vw, 40px); line-height: 1.5; color: #33324A; text-align: center;">{{ s.voices.title }}</h2>
  </div>
  <div class="voices-marquee" style="overflow: hidden; padding: clamp(20px, 2.5vw, 30px) 0 4px;">
    <div class="voices-track" style="display: flex; width: max-content; align-items: stretch; --voices-seconds: {{ vdur }}s;">
      {% for pass in range(2) %}
      {% for t in col.testimonials %}
      <figure style="flex: 0 0 auto; width: clamp(300px, 46vw, 440px); margin: 0 20px 0 0; box-sizing: border-box; background: #FFFFFF; border-radius: 16px; padding: 28px 28px 24px; display: flex; flex-direction: column; gap: 16px;"{% if pass == 1 %} aria-hidden="true"{% endif %}>
        <span aria-hidden="true" style="font-family: 'Noto Serif TC', serif; font-size: 52px; line-height: 0.55; color: #F9C04B; font-weight: 900;">“</span>
        <blockquote style="margin: 0; font-family: 'Noto Serif TC', serif; font-size: clamp(15px, 1.6vw, 18px); line-height: 2; color: #33324A; flex: 1; text-wrap: pretty;">{{ t.body }}</blockquote>
        <figcaption style="font-size: 14px; color: #625E92; font-weight: 500;">— {{ t.attribution }}<br>{{ t.context }}</figcaption>
      </figure>
      {% endfor %}
      {% endfor %}
    </div>
  </div>
</section>
