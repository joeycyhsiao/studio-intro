<!-- ⑤ 關於蕭喬尹 -->
<section id="about" style="background: #F6F6F9; padding: clamp(46px, 6vw, 82px) clamp(24px, 6vw, 80px);">
  <div style="max-width: 1100px; margin: 0 auto;">
    <div style="max-width: 820px; margin: 0 auto 44px;">
      <p style="margin: 0 0 16px; font-size: 14px; letter-spacing: 0.2em; font-weight: 700; color: #625E92; text-align: center;">{{ s.about.eyebrow }}</p>
      <h2 style="margin: 0 0 28px; font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: clamp(26px, 3.4vw, 40px); line-height: 1.5; color: #33324A; text-align: center;">{{ s.about.title }}</h2>
      <p style="margin: 0; font-size: clamp(16px, 1.5vw, 18px); line-height: 2; color: #1A1650; text-wrap: pretty">{{ s.about.bio_html | safe }}</p>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
      {% for cred in s.about.credentials %}
      <div style="background: #FFFFFF; border-radius: 16px; padding: 36px 32px;">
        <h3 style="margin: 0 0 8px; font-size: 15px; letter-spacing: 0.16em; font-weight: 700; color: #625E92;">{{ cred.heading }}</h3>
        <span aria-hidden="true" style="display: block; width: 32px; height: 4px; border-radius: 2px; background: #F9C04B; margin-bottom: 16px;"></span>
        <ul style="margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column;">
          {% for it in cred['items'] %}
          <li style="display: flex; flex-direction: column; gap: 3px; padding: {{ '14px 0 0' if loop.last else '14px 0' }};{% if not loop.last %} border-bottom: 1px solid #EFEFF5;{% endif %}">
            <span style="font-size: 16px; font-weight: 700; color: #33324A; line-height: 1.6;">{{ it.title }}</span>
            <span style="font-size: 14px; color: #625E92;">{% if it.sub_html %}{{ it.sub_html | safe }}{% else %}{{ it.sub }}{% endif %}</span>
          </li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
