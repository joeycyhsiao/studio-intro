eyebrow: 我有什麼樣的專業經歷背景？
title: UX引路人 蕭喬尹博士
bio_html: '您好，我是 UX 引路人 Joey。在過去，我有十年的時間在美國，於密西根大學攻讀資訊科學博士，並且在 Yahoo USA 擔任 UX 研究員。幾年前回到台灣後，我創立了引鹿創新體驗研究室，<b style="background-color: rgb(249, 192, 75);">專注把 UX 研究方法應用在 AI 時代的服務與產品創新</b>。<br>我擅長面對廣泛的研究對象與題材，包括低收入戶、新住民、長者這些平常在設計裡最容易被忽略的使用者。理解不同族群真正的需求，是我最核心的能力。而利用 AI 工具融入產品與開發流程，是我最能為客戶實現的價值。'
