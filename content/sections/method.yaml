eyebrow: 我們使用的專業 CLUES 方法
title: 先看懂真實的人，再做有本的創新
lead_html: '創新精神就藏在方法裡：<span style="color: rgb(217, 142, 0);">C·L·U·E·S</span>'
steps:
  - {letter: C, en: CLARIFY,   name: 釐清脈絡, body: 先釐清問題發生的真實情境與限制，而不是憑團隊的想像下判斷。}
  - {letter: L, en: LISTEN,    name: 傾聽需求, body: 用研究貼近使用者真實的想法與行為，包含最容易被忽略的族群。}
  - {letter: U, en: UNCOVER,   name: 挖掘洞察, body: 把零散的觀察，收斂成能支撐決策的關鍵洞察。}
  - {letter: E, en: ESTABLISH, name: 建立方案, body: 把洞察轉成有依據的設計與共創方案，不再靠感覺發散。}
  - {letter: S, en: SHIP,      name: 交付落地, body: 驗證方案對誰有效、為什麼有效，真正交付能落地的成果、讓團隊與主管買單。}
